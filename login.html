<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Login - GitHub Issues Tracker</title>
</head>

<body class="flex justify-center items-center min-h-screen bg-gray-100 p-4">

  <div class="bg-slate-200 shadow-lg flex flex-col items-center w-full max-w-md rounded-md p-6 md:p-10">

    <div class="flex flex-col items-center">
      <img class="mb-5 w-16" src="assets/github-logo.png" alt="">
      <h1 class="text-xl md:text-2xl font-bold text-center">GitHub Issues Tracker</h1>
      <h4 class="font-thin text-center">Sign in to manage your issues</h4>
    </div>

    <div class="flex flex-col w-full mt-6">
      <label class="m-1">Username</label>
      <input id="username" class="border shadow-md m-1 p-3 rounded-md w-full" type="text" placeholder="Enter Username">
      <span class="text-purple-600 mb-4 font-normal ml-1">Default: admin</span>

      <label class="m-1">Password</label>
      <input id="password" type="password" placeholder="Enter Password" class="border shadow-md m-1 p-3 rounded-md w-full">
      <span class="text-purple-600 mb-7 font-normal ml-1">Default: admin123</span>
    </div>

    <button id="loginBtn" class="bg-blue-800 text-white w-full p-3 rounded-lg shadow-sm mb-5">
      Sign In
    </button>

    <div class="flex mb-3 justify-center items-center gap-2 w-full">
      <hr class="flex-1">
      <h1>OR</h1>
      <hr class="flex-1">
    </div>

    <div class="flex flex-col items-center w-full">
      <h4 class="mb-4">Demo Credentials:</h4>

      <div class="bg-slate-100 flex flex-col items-center p-6 w-full rounded-md">
        <h2><span class="font-bold">Username:</span> admin</h2>
        <h2><span class="font-bold">Password:</span> admin123</h2>
      </div>

    </div>

  </div>

  <script>
    if (localStorage.getItem("loggedIn") === "true") {
      window.location.href = "index.html";
    }

    document.getElementById("loginBtn").addEventListener("click", () => {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      if (username === "admin" && password === "admin123") {
        localStorage.setItem("loggedIn", "true"); 
        window.location.href = "index.html";
      } else {
        alert("Invalid username or password");
      }
    });
  </script>
</body>

</html>
