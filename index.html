<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>
    <nav class="bg-slate-200 shadow-md p-6 m-2 flex justify-between items-center">
        <div class="flex gap-1 items-center">
            <img class="w-5" src="assets/github-logo.png" alt="">
            <p>GitHub Issues Tracker</p>
        </div>
        <div class="flex gap-2">
            <input type="text" class="border rounded-lg p-1 w-40" placeholder="Search issues">
            <button class="bg-blue-600 p-2 rounded-md text-white">New Issue</button>
        </div>
    </nav>
    <section class="bg-slate-100 m-8 p-4 flex gap-4">
        <button class="border p-2 w-25 rounded-md hover:bg-slate-600 hover:text-white">All</button>
        <button class="border p-2 w-25 rounded-md hover:bg-slate-600 hover:text-white">Open</button>
        <button class="border p-2 w-25 rounded-md hover:bg-slate-600 hover:text-white">Closed</button>
    </section>
    <section class="bg-slate-100  m-8 p-2">
        <div class="flex justify-between shadow-lg p-2 items-center">
            <div class="flex gap-2">
                <img class="w-12" src="assets/Aperture.png" alt="">
                <div>
                    <h1>50 Issues</h1>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 p-2">
               <h3>Open</h3>
               <h3>Closed</h3>
            </div>
        </div>
    </section>
    <script src="index.js"></script>
</body>

</html>
