<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">

    <nav class="bg-slate-200 shadow-md p-4 m-2 flex justify-between items-center">

        <div class="flex gap-2 items-center">
            <img class="w-6" src="assets/github-logo.png" alt="">
            <p class="font-semibold">GitHub Issues Tracker</p>
        </div>

        <div class="flex gap-2">
            <input id="search_input" type="text" class="border rounded-lg p-1 w-40" placeholder="Search issues">
            <button id="search_btn" class="bg-blue-600 px-3 py-1 rounded-md text-white">
                New Issue
            </button>
        </div>

    </nav>

    <section class="bg-slate-100 m-8 p-4 flex gap-4">
        <button id="all" class="border p-2 w-24 rounded-md hover:bg-slate-600 hover:text-white">All</button>
        <button id="open" class="border p-2 w-24 rounded-md hover:bg-slate-600 hover:text-white">Open</button>
        <button id="closed" class="border p-2 w-24 rounded-md hover:bg-slate-600 hover:text-white">Closed</button>
    </section>

    <section class="bg-slate-100 m-8 p-2">
        <div class="flex justify-between shadow-lg p-4 items-center">

            <div class="flex gap-2 items-center">
                <img class="w-10" src="assets/Aperture.png" alt="">
                <div>
                    <h1 id="count" class="font-bold"> Issues</h1>
                    <p class="text-sm text-gray-600">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-6">
                <h3>Open</h3>
                <h3>Closed</h3>
            </div>

        </div>
    </section>

    <section id="issues"
        class="bg-slate-300 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 m-8 p-4 shadow-md rounded">

    </section>
    <div id="issue-modal" class="fixed inset-0 backdrop-blur-0 hidden flex justify-center items-center">

        <div class="bg-white/90 backdrop-blur-md rounded-lg shadow-xl w-11/12 max-w-lg p-6 relative">

            <h2 id="modal-title" class="font-bold text-xl mb-2"></h2>

            <div class="flex items-center gap-2 text-sm text-gray-600 mb-2">
                <span id="modal-status" class="px-2 py-1 rounded-full text-white text-xs"></span>
                <span id="modal-author"></span>
                <span id="modal-date"></span>
            </div>

            <div id="modal-labels" class="flex gap-2 mb-4"></div>

            <p id="modal-description" class="text-gray-700 mb-4"></p>

            <div class="flex justify-between text-sm bg-gray-500 m-7 p-4 text-white border-t pt-2">
                <span>Assignee: <b id="modal-assignee"></b></span>
                <span>Priority: <b id="modal-priority"></b></span>
            </div>

            <button id="modal-close"
                class="absolute bottom-2 right-0  bg-purple-600  p-2 text-white  rounded hover:bg-purple-700">
                Close
            </button>

        </div>

    </div>

    <script src="index.js"></script>

</body>

</html>
